<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="45%" style="stop-color:#142a52"/>
      <stop offset="100%" style="stop-color:#1e64fa"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#000000;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="tablet" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#e6eefb;stop-opacity:0.9"/>
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Subtle grid pattern suggesting classroom -->
  <g opacity="0.08" stroke="#ffffff" stroke-width="1" fill="none">
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="675"/>
    <line x1="600" y1="0" x2="600" y2="675"/>
    <line x1="900" y1="0" x2="900" y2="675"/>
  </g>

  <!-- Large decorative shapes -->
  <circle cx="1050" cy="120" r="200" fill="#1e64fa" opacity="0.18"/>
  <circle cx="150" cy="550" r="160" fill="#1e64fa" opacity="0.12"/>

  <!-- Tablet/screen illustration (right side) -->
  <g transform="translate(720, 120)">
    <!-- Tablet frame -->
    <rect x="0" y="0" width="400" height="280" rx="16" fill="#0a1628" stroke="#1e64fa" stroke-width="3" opacity="0.9"/>
    <!-- Screen -->
    <rect x="16" y="16" width="368" height="248" rx="6" fill="url(#tablet)"/>
    <!-- Screen content: two video tiles (tutor + tutee) -->
    <rect x="32" y="32" width="160" height="110" rx="4" fill="#1e64fa" opacity="0.85"/>
    <circle cx="112" cy="80" r="22" fill="#ffffff" opacity="0.95"/>
    <rect x="60" y="112" width="104" height="6" rx="3" fill="#ffffff" opacity="0.7"/>

    <rect x="208" y="32" width="160" height="110" rx="4" fill="#0e41ad" opacity="0.85"/>
    <circle cx="288" cy="80" r="22" fill="#ffffff" opacity="0.95"/>
    <rect x="236" y="112" width="104" height="6" rx="3" fill="#ffffff" opacity="0.7"/>

    <!-- Whiteboard/notes area -->
    <rect x="32" y="158" width="336" height="90" rx="4" fill="#f3f6fc"/>
    <!-- Equation scribbles -->
    <line x1="48" y1="180" x2="180" y2="180" stroke="#1e64fa" stroke-width="3" stroke-linecap="round"/>
    <line x1="48" y1="200" x2="240" y2="200" stroke="#1e64fa" stroke-width="3" stroke-linecap="round"/>
    <line x1="48" y1="220" x2="160" y2="220" stroke="#0e41ad" stroke-width="3" stroke-linecap="round"/>
    <circle cx="280" cy="200" r="14" fill="none" stroke="#1e64fa" stroke-width="3"/>
    <text x="273" y="206" font-family="sans-serif" font-size="16" font-weight="700" fill="#1e64fa">?</text>
  </g>

  <!-- Live indicator -->
  <g transform="translate(720, 80)">
    <rect x="0" y="0" width="72" height="28" rx="14" fill="#ef4444"/>
    <circle cx="14" cy="14" r="5" fill="#ffffff"/>
    <text x="26" y="19" font-family="'Noto Sans KR', sans-serif" font-size="12" font-weight="700" fill="#ffffff" letter-spacing="-0.03em">LIVE</text>
  </g>

  <!-- Bottom gradient overlay for text legibility -->
  <rect width="1200" height="675" fill="url(#overlay)"/>

  <!-- Category badge - Samsung Newsroom style: 16px/700/#1E64FA -->
  <rect x="60" y="410" width="104" height="34" rx="4" fill="#1e64fa"/>
  <text x="112" y="432" font-family="'Noto Sans KR', sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-0.03em">공지사항</text>

  <!-- Title - Samsung Newsroom hero style: 30px/700 (scaled up for thumbnail) -->
  <text font-family="'Noto Sans KR', sans-serif" font-weight="700" fill="#ffffff" letter-spacing="-0.03em">
    <tspan x="60" y="498" font-size="44">정율사관, '1:1 코칭'</tspan>
    <tspan x="60" y="548" font-size="44">피어 튜터링 정식 런칭</tspan>
  </text>

  <!-- Description - 18px/500 -->
  <text x="60" y="592" font-family="'Noto Sans KR', sans-serif" font-size="18" font-weight="500" fill="rgba(255,255,255,0.85)" letter-spacing="-0.03em">
    ClassIn Live 기반 양방향 학습, 학생이 서로 가르치고 배운다
  </text>

  <!-- Brand footer -->
  <text x="60" y="632" font-family="'Noto Sans KR', sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.55)" letter-spacing="-0.03em">정율 교육정보 | 2026.04.13</text>
</svg>
