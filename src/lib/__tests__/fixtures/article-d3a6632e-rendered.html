<span style="text-align:center">1학기 1차 정기고사 공통수학1 문항별 분석</span><br /></figcaption></figure><p><span><br /></span></p><p><br /></p><p><br /></p><p><br /></p><p><b>[중원고등학교 1학년 1학기 1차 정기고사 상세 총평]</b></p><p><b>▣전체 출제 경향 및 난이도 분석:</b></p><p>난이도 양극화 구조: 이번 중원고 시험은 1번부터 14번까지의 기초~중간</p><p>난이도 문항과 15번부터 21번까지의 고난도 문항이 뚜렷하게 구분되는</p><p>양극화 구조를 보였습니다. 하위권 학생들은 기초 문항에서 점수를 확보할</p><p>수 있으나, 상위권 변별력은 후반부 4~5개 문항에서 결정되었습니다.</p><p></p><p><br /></p><b><p><b>▣ 단원별 주요 체크포인트</b></p></b><p></p><p>다항식 및 나머지 정리 (개념 결합형 사고력 요구):</p><p>단순 나눗셈 원리를 넘어, 나머지 정리를 여러 번 </p><p><span>연립하거나 다항식의 구조를 </span><span>추론해야 하는 13번, 15번, 16번 문항이</span></p><p><span> 돋보였습니다. 특히 15번은 홀수인 </span><span>자연수 조건과 나머지 정리의 </span></p><p><span>심화 개념을 유기적으로 연결해야 풀 수 있는 </span><span>고난도 사고를 요구했습니다.</span></p><p></p><p><br /></p><p><span>복소수와 이차방정식 (함정형 오답 유도 및 주기성):</span></p><p></p><p></p><p><span>4번과 같이 복소수의 기본 성질을 묻는 문항에서도 </span></p><p><span>실수 조건과 허수 조건을 </span><span>명확히 분리하지 않으면 오답을 선택하도록 </span></p><span><p><span>유도하는 '매력적인 오답' 함정이 </span><span>존재했습니다.</span></p></span><p></p><p>논술형 21번은 거듭제곱의 주기성을 체계적으로 나열하여 조건에 맞는 </p><p></p><p><span>자연수 </span><span>개수를 정확히 산출해야 하는 문항으로, </span></p><span><p><span>서술 과정의 논리적 완결성이 감점 </span><span>여부를 결정했습니다.</span></p></span><p></p><p>이차함수 (기하학적 해석과 위치 관계):</p><p></p><p><span>도형의 넓이를 함수로 표현하는 18번과 구간별로 정의된 함수 h(x)와 </span></p><p><span>직선의 </span><span>교점 개수를 분석하는 19번은 이번 시험의 킬러 문항이었습니다. </span></p><span><p><span>그래프의 </span><span>대칭축, 꼭짓점, 경계값의 위치 관계를 동적으로 파악하는 훈련이 부족했다면 </span><span>접근하기 매우 까다로웠을 것입니다.</span></p></span><p></p><p></p><p><br /></p><p><br /></p>
<p></p><figure><figcaption><b>위에서 말했던 탐구보고서 추천 문항  3가지 와  작성 예시에 대해</b></figcaption><figcaption><b> 알아볼까요?</b></figcaption></figure><p></p><figure><img src="https://news.jung-youl.com/api/admin/upload/2026/05/1778228959947-97ce3c3a.png" alt="image.png" style="text-align:left" /><figcaption><br /></figcaption><figcaption><br /></figcaption><figcaption><br /></figcaption></figure><p>1. [문항 18번] 이차함수의 최대·최소와 도형의 닮음</p><figure><figcaption><p>정석 해석 경로 (변수 설정과 함수화) : 직각이등변삼각형의 </p><p>기하학적 성질을 이용하여 <span>직사각형의 가로 또는 세로의 길이를 변수로</span></p><p><span> 설정합니다. 이후 닮음비를 활용하여 </span><span>인접한 변의 길이를 변수에 관한</span></p><p><span>식으로 나타내고, 넓이 공식을 통해 이차함수를 </span><span>유도합니다.</span></p><p><span> 마지막으로 표준형 변환을 통해 최댓값을 구하는 '대수적 모델링' </span><span>경로입니다.</span></p><p>직관적 해석 원리 (대칭성과 비율의 보존) : 도형을 좌표평면 위에 올리지 않고도, <span>직각이등변삼각형 내부에 내접하는 사각형이 가질 수 있는 </span></p><p><span>**'기하학적 대칭성'**에 </span><span>주목합니다. 넓이가 최대가 되는 순간은 변수들 사이의 비율이 가장 균형을 이루는 </span><span>지점(중점 연결 등)임을 이용합니다. </span></p><p><span>닮음을 단순 계산 도구가 아닌, </span><span>'길이의 비가 </span><span>유지되는 변환'으로 이해하여 식을 간소화하는 원리를 탐구하기에 적합합니다.</span></p><p>2. [문항 21번] 복소수의 거듭제곱과 주기성</p><p>정석 해석 경로 (수치적 귀납과 규칙성 발견) : 복소수를 직접 제곱, 네제곱하며 i 또는 <span>1이 나오는 지점을 찾습니다. </span></p><p><span>이후 반복되는 규칙(주기)을 파악하여 n의 범위를 분류 </span><span>하고 조건을 만족하는 자연수의 개수를 세는 '귀납적 추론' 경로입니다.</span></p><p>직관적 해석 원리 (단위 원 위에서의 회전과 대칭) : 복소수를 크기가 1인 벡터로 보고, <span>거듭제곱을 단위 원 위에서의 '일정한 각도의 회전'으로 해석합니다. </span></p><p><span>켤레복소수와의 </span><span>합이 양의 실수가 되는 지점은 두 복소수가 실축 위에서 동기화되는 순간임을 파악하 </span><span>는 방식입니다. </span></p><p><span>대수적인 계산을 기하학적 회전으로 치환하는 원리를 탐구하기에</span></p><p>적합합니다.</p><p>3. [문항 19번] 함수 그래프와 직선의 동적 위치 관계</p><p>정석 해석 경로 (대수적 판별식과 경계 조사) : 구간별로 함수를 정의하고 그래프를 <span>그린 뒤, 직선과 접하는 순간과 함수의 꺾이는 점(경계점)을 지나는 순간을 각각 </span><span>계산합니다. 모든 임계 지점의 k값을 대수적으로 구한 뒤 조건에 맞는 범위를 찾는 </span><span>'상태 분석' 경로입니다.</span></p><p>직관적 해석 원리 (정점 중심의 회전 변환 해석) : 직선을 고정된 정점을 지나는 <span>'회전하는 막대기'로 간주합니다. 정점에서 직선이 회전함에 따라 교점의 개수가 </span><span>변하는 찰나의 순간(접점, 경계점)을 시각적으로 추적합니다. 이는 기하학적 직관을 </span><span>대수적 계산으로 연결하는 고차원적 사고를 요구하는 </span></p><p><span>소재입니다.</span></p></figcaption></figure><p></p><p><br /></p><p><span>이상으로 2026 중원고등학교 1학기 1차 정기고사  고1  공통수학1 분석지를 마무리하겠습니다!</span></p><p><br /></p><p></p><p><span>이 분석지를 통해 다음 시험 분석 및 시험지내에서의 탐구보고서 소재를 얻어갔으면 좋겠습니다! </span></p><p></p></figcaption></figure><figure style="text-align:left"><figure><figcaption><br /></figcaption></figure></figure><p style="text-align:left"></p></div>
